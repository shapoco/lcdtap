; ============================================================================
; LcdTap example for M5Stack Tab5 (ESP32-P4) - PlatformIO Configuration
;
; The official espressif32 platform does not support the ESP32-P4, so this
; project uses the community pioarduino platform (Arduino-ESP32 3.x based on
; ESP-IDF v5.5).
; ============================================================================

; The m5stack-tab5-p4 board definition provides ARDUINO_USB_CDC_ON_BOOT=1
; and ARDUINO_USB_MODE=1 so that Serial goes to the USB-Serial/JTAG port
; (the generic esp32-p4 board routes Serial to UART0, which is invisible
; on the Tab5's USB-C), plus the 16MB flash / partition layout.
[env:m5tab5]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
framework = arduino
board = m5stack-tab5-p4
build_flags =
    -Wall -Wextra
    -DBOARD_HAS_PSRAM
monitor_speed = 115200
lib_deps =
    m5stack/M5Unified@^0.2.17
    ; Pinned exact (not a caret range): ppa_blit.cpp reaches into M5GFX's
    ; internal Panel_DSI/Panel_FrameBufferBase headers (not re-exported by
    ; M5GFX.h) to locate the physical panel framebuffer for the ESP32-P4
    ; PPA. Bump deliberately and re-verify those internals if this
    ; version changes.
    m5stack/M5GFX@0.2.25
    lcdtap=symlink://../../lib
